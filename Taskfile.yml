version: '3'

tasks:
  lint:
    desc: Run golangci-lint
    cmds:
      - golangci-lint run ./...
      - sqlc vet

  format:
    desc: Format Go code and tidy modules
    cmds:
      - go fmt ./...
      - go mod tidy

  sqlc:
    desc: Generate Go code from SQL queries using sqlc
    sources:
      - sqlc.yaml
      - "**/*.sql"
    generates:
      - "**/*.gen.go"
    cmds:
      - sqlc generate

  generate:
    desc: Run all code generation
    cmds:
      - task: sqlc

  ci:
    desc: Run ci tasks
    cmds:
      - task: generate
      - task: format
      - task: lint
